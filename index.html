<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #92aea5;
        padding: 40px;
        color: #333;
    }
    #shopping-list {
        max-width: 500px;
        background: white;
        margin: 0 auto;
        padding: 30px;
        border-radius: 8px;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    h1 {
        font-size: 24px;
        margin: 0;
    }
    .btn {
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-primary {
        background-color: #6cae4b;
        color: white;
    }
    .btn-primary:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
    }
    .btn-cancel {
        background-color: #e74c3c;
        color: white;
    }
    .add-item-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
        padding: 15px;
        background: #fafafa;
        border-radius: 6px;
    }
    .add-item-form input[type="text"] {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    ul {
        list-style: none;
        padding: 0;
    }
    li {
        padding: 12px;
        margin-bottom: 8px;
        background: #f9f9f9;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        user-select: none;
    }
    li:hover {
        background: #f0f0f0;
    }
    li.priority {
        color: #c0392b;
        font-weight: bold;
        background-color: #fdedec;
    }
    li.strikeout {
        color: #95a5a6 !important;
        text-decoration: line-through;
        border-left-color: #95a5a6;
        background-color: #f2f4f4;
        font-weight: normal;
    }
    </style>
</head>
<body>
    <div id="shopping-list">
        <div class="header">
            <h1>{{header || 'Welcome'}}</h1>
            <button v-if="editing" @click="doEdit(false)" class="btn btn-cancel">Отмена</button>
            <button v-else @click="doEdit(true)" class="btn btn-primry">Добавить</button>
        </div>

        <div v-if="editing" class="add-item-form">
        <input
        @keyup.enter="saveItem" 
        v-model="newItem" type="text" placeholder="Add an item">

        <label>
            <input type="checkbox" v-model="newItemHighPriority"> 
            Высокий приоритет
        </label>
        <button
            @click="saveItem"
            class="btn btn-primary">
            Сохранить
        </button>
        </div>
        <p v-if="items.length === 0">Дел нет</p>
        <ul>
            <li 
            v-for="item in reversedItems" 
            @click="togglePurchased(item)"
            :key="item.id"
            :class="{strikeout: item.purchased, priority: item.highPriority}"
            class="static-class"
            >{{item.label}}</li>
        </ul>
    </div>
    <script src="https://unpkg.com/vue@3"></script>

    <script>
        const shoppingListApp = Vue.createApp({
            data(){
                return{
                    header: "Список дел",
                    editing: false,
                    newItem: '',
                    newItemHighPriority: false,
                    items: [
                        {id:1, label:"Вернуть книгу в библиотеку", purchased: true, highPriority: false},
                        {id:2, label:"Покрасить стену", purchased: true,  highPriority: false},
                        {id:3, label:"Приготовить пирог", purchased:false,  highPriority: true}
                    ]
                }
            },
            computed:{
                reversedItems(){
                    return [...this.items].reverse()
                }
            },
            methods:{
                saveItem(){
                    this.items.push({
                        id:this.items.length + 1, 
                        label: this.newItem,
                        highPriority: this.newItemHighPriority,
                        purchased:false
                    })
                    this.newItem=""
                    this.newItemHighPriority=false
                },
                doEdit(editing){
                    this.editing = editing
                    this.newItem = ""
                    this.newItemHighPriority=""
                },
                togglePurchased(item){
                    item.purchased = !item.purchased
                }
            }  
        })
        .mount('#shopping-list')
    </script>
</body>
</html>
